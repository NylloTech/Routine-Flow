<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caderno de Rotinas Pro</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --primary: #8b5cf6;
            --accent: #f59e0b;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --done-color: #475569;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

        /* NAVEGAÇÃO PRINCIPAL */
        .main-nav {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--bg-card);
            padding: 6px;
            border-radius: 16px;
            border: 1px solid var(--bg-input);
        }

        .nav-mode-btn {
            padding: 12px 5px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 11px;
            text-transform: uppercase;
        }

        .nav-mode-btn.active {
            background: var(--bg-input);
            color: white;
        }

        /* CONTEÚDO DAS SEÇÕES */
        .view-section { display: none; animation: slideDown 0.3s ease; }
        .view-section.active { display: block; }

        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* ESTILO DOS DIAS DA SEMANA */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }

        .day-btn {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 1px solid var(--bg-input);
            padding: 12px 0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .day-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* CARD DE CALENDÁRIO - AJUSTADO PARA CORRIGIR O BUG */
        .calendar-box {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 15px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .date-display {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent);
            display: block;
        }

        /* AJUSTE NO INPUT DE DATA PARA MOBILE */
        input[type="date"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--bg-input);
            background: var(--bg-body);
            color: white;
            font-size: 16px;
            outline: none;
            appearance: none; /* Remove estilos padrão do sistema */
            -webkit-appearance: none;
            display: block;
        }

        /* VISÃO GERAL */
        .timeline-container { display: flex; flex-direction: column; gap: 15px; }
        .timeline-day-card {
            background: var(--bg-card);
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 12px;
        }
        .timeline-date { color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
        .timeline-task-item { font-size: 14px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .timeline-task-item.done { text-decoration: line-through; color: var(--text-muted); }

        /* RESUMO DE DIAS COM EVENTOS */
        .event-summary {
            background: rgba(245, 158, 11, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px dashed var(--accent);
        }

        .event-summary h4 {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .event-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .event-tag {
            background: var(--accent);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ÁREA DE PROGRESSO */
        .progress-card {
            background: var(--bg-card);
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 20px;
        }

        .progress-bar-bg {
            background: var(--bg-body);
            height: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: 0.6s;
        }

        /* INPUT DE TAREFAS */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #taskInput {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            border: 2px solid var(--bg-input);
            background: var(--bg-card);
            color: white;
            font-size: 16px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            width: 60px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 28px;
        }

        .btn-add.mode-cal { background: var(--accent); color: #000; }

        /* LISTA DE TAREFAS */
        .task-list { display: flex; flex-direction: column; gap: 12px; }

        .task-item {
            background: var(--bg-card);
            padding: 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-item.done { opacity: 0.5; }
        .task-item.done .task-text { text-decoration: line-through; color: var(--done-color); }
        .task-item.done .checkbox { background: var(--success); border-color: var(--success); color: white; }

        .task-text { flex: 1; }

        .btn-del { color: var(--text-muted); background: none; border: none; cursor: pointer; font-size: 18px; }

    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center; margin: 20px 0; font-size: 18px; letter-spacing: 2px; color: var(--primary);">MY ROUTINE & AGENDA</h1>

    <div class="main-nav">
        <button class="nav-mode-btn active" id="btnModeRotina">Rotina</button>
        <button class="nav-mode-btn" id="btnModeCalendario">Agenda</button>
        <button class="nav-mode-btn" id="btnModeGeral">Visão Geral</button>
    </div>

    <div id="sectionRotina" class="view-section active">
        <div class="week-grid">
            <button class="day-btn active" data-dia="segunda">Seg</button>
            <button class="day-btn" data-dia="terca">Ter</button>
            <button class="day-btn" data-dia="quarta">Qua</button>
            <button class="day-btn" data-dia="quinta">Qui</button>
            <button class="day-btn" data-dia="sexta">Sex</button>
            <button class="day-btn" data-dia="sabado">Sáb</button>
            <button class="day-btn" data-dia="domingo">Dom</button>
        </div>
    </div>

    <div id="sectionCalendario" class="view-section">
        <div class="calendar-box">
            <span id="fullDateDisplay" class="date-display">Carregando...</span>
            <input type="date" id="datePicker">
        </div>
        
        <div class="event-summary">
            <h4>Dias com eventos marcados:</h4>
            <div id="eventTags" class="event-tag-list">
                <span style="color:var(--text-muted); font-size:11px;">Buscando eventos...</span>
            </div>
        </div>
    </div>

    <div id="sectionGeral" class="view-section">
        <h3 style="font-size: 14px; margin-bottom: 15px; color: var(--accent); text-align: center;">RESUMO DE COMPROMISSOS</h3>
        <div id="timelineContent" class="timeline-container"></div>
    </div>

    <div id="areaInteracao">
        <div class="progress-card">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: bold;">
                <span id="labelContexto">SEGUNDA-FEIRA</span>
                <span id="labelPercent">0%</span>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="O que precisa ser feito?">
            <button class="btn-add" id="btnAdd">+</button>
        </div>

        <div class="task-list" id="taskList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB14W4fP1HzQvglojai5mcK96ga_u-p0GI",
        authDomain: "projeto-area-artistica.firebaseapp.com",
        databaseURL: "https://projeto-area-artistica-default-rtdb.firebaseio.com",
        projectId: "projeto-area-artistica",
        storageBucket: "projeto-area-artistica.appspot.com",
        messagingSenderId: "561604278068",
        appId: "1:561604278068:web:43b9846f5279a1d85f1761"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let modoAtual = 'rotina'; 
    let diaSemanaAtual = 'segunda';
    let dataCalendarioAtual = new Date().toISOString().split('T')[0];
    let listenerAtivo = null;

    const taskList = document.getElementById('taskList');
    const taskInput = document.getElementById('taskInput');
    const btnAdd = document.getElementById('btnAdd');
    const datePicker = document.getElementById('datePicker');
    const fullDateDisplay = document.getElementById('fullDateDisplay');
    const eventTags = document.getElementById('eventTags');
    const timelineContent = document.getElementById('timelineContent');

    function formatarDataBR(dataStr, curta = false) {
        const data = new Date(dataStr + 'T12:00:00');
        if(curta) return data.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', weekday: 'short' });
        return data.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function monitorarTodosEventos() {
        const eventosRef = ref(db, 'eventos_calendario');
        onValue(eventosRef, (snapshot) => {
            const dados = snapshot.val() || {};
            const datasComTarefa = Object.keys(dados).sort();
            
            eventTags.innerHTML = "";
            if(datasComTarefa.length === 0) {
                eventTags.innerHTML = `<span style="color:var(--text-muted); font-size:11px;">Nenhum evento futuro.</span>`;
            } else {
                datasComTarefa.forEach(data => {
                    const tag = document.createElement('span');
                    tag.className = 'event-tag';
                    tag.innerText = data.split('-').reverse().slice(0,2).join('/');
                    tag.onclick = () => {
                        datePicker.value = data;
                        atualizarVisualCalendario(data);
                        setModo('calendario');
                    };
                    eventTags.appendChild(tag);
                });
            }
            renderTimeline(dados, datasComTarefa);
        });
    }

    function renderTimeline(dados, datas) {
        timelineContent.innerHTML = "";
        if(datas.length === 0) {
            timelineContent.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:13px;">Sua agenda está vazia.</p>`;
            return;
        }
        datas.forEach(data => {
            const card = document.createElement('div');
            card.className = 'timeline-day-card';
            let htmlTarefas = "";
            Object.entries(dados[data]).forEach(([id, t]) => {
                htmlTarefas += `<div class="timeline-task-item ${t.done ? 'done' : ''}"><span>${t.text}</span><span>${t.done ? '✅' : '⏳'}</span></div>`;
            });
            card.innerHTML = `<span class="timeline-date">${formatarDataBR(data, true).toUpperCase()}</span>${htmlTarefas}<button style="margin-top:10px; background:none; border:none; color:var(--primary); font-size:10px; cursor:pointer; font-weight:bold;" onclick="window.irParaData('${data}')">EDITAR ESTE DIA →</button>`;
            timelineContent.appendChild(card);
        });
    }

    window.irParaData = (data) => {
        datePicker.value = data;
        atualizarVisualCalendario(data);
        setModo('calendario');
    };

    function setModo(modo) {
        modoAtual = modo;
        document.getElementById('btnModeRotina').classList.toggle('active', modo === 'rotina');
        document.getElementById('btnModeCalendario').classList.toggle('active', modo === 'calendario');
        document.getElementById('btnModeGeral').classList.toggle('active', modo === 'geral');
        document.getElementById('sectionRotina').classList.toggle('active', modo === 'rotina');
        document.getElementById('sectionCalendario').classList.toggle('active', modo === 'calendario');
        document.getElementById('sectionGeral').classList.toggle('active', modo === 'geral');
        document.getElementById('areaInteracao').style.display = (modo === 'geral') ? 'none' : 'block';
        btnAdd.classList.toggle('mode-cal', modo === 'calendario');
        if(modo === 'rotina') conectarBanco(`rotina_semanal/${diaSemanaAtual}`);
        if(modo === 'calendario') atualizarVisualCalendario(dataCalendarioAtual);
    }

    function atualizarVisualCalendario(data) {
        dataCalendarioAtual = data;
        fullDateDisplay.innerText = formatarDataBR(data);
        conectarBanco(`eventos_calendario/${data}`);
    }

    function conectarBanco(caminho) {
        if (listenerAtivo) off(listenerAtivo);
        const dbRef = ref(db, caminho);
        listenerAtivo = dbRef;
        const label = caminho.includes('rotina') ? diaSemanaAtual.toUpperCase() : dataCalendarioAtual.split('-').reverse().join('/');
        document.getElementById('labelContexto').innerText = label;
        onValue(dbRef, (snapshot) => render(snapshot.val() || {}));
    }

    function render(tasks) {
        taskList.innerHTML = "";
        const entries = Object.entries(tasks);
        let concluido = 0;
        entries.forEach(([id, task]) => {
            if(task.done) concluido++;
            const item = document.createElement('div');
            item.className = `task-item ${task.done ? 'done' : ''}`;
            item.innerHTML = `<div class="checkbox" onclick="window.toggleTask('${id}', ${task.done})">${task.done ? '✓' : ''}</div><div class="task-text">${task.text}</div><button class="btn-del" onclick="window.deleteTask('${id}')">✕</button>`;
            taskList.appendChild(item);
        });
        const perc = entries.length > 0 ? Math.round((concluido / entries.length) * 100) : 0;
        document.getElementById('progressBar').style.width = perc + "%";
        document.getElementById('labelPercent').innerText = perc + "%";
    }

    window.toggleTask = (id, status) => {
        const path = modoAtual === 'rotina' ? `rotina_semanal/${diaSemanaAtual}/${id}` : `eventos_calendario/${dataCalendarioAtual}/${id}`;
        update(ref(db, path), { done: !status });
    };

    window.deleteTask = (id) => {
        const path = modoAtual === 'rotina' ? `rotina_semanal/${diaSemanaAtual}/${id}` : `eventos_calendario/${dataCalendarioAtual}/${id}`;
        if(confirm("Excluir tarefa?")) remove(ref(db, path));
    };

    btnAdd.onclick = () => {
        const text = taskInput.value.trim();
        if(!text) return;
        const path = modoAtual === 'rotina' ? `rotina_semanal/${diaSemanaAtual}` : `eventos_calendario/${dataCalendarioAtual}`;
        push(ref(db, path), { text, done: false });
        taskInput.value = "";
    };

    document.getElementById('btnModeRotina').onclick = () => setModo('rotina');
    document.getElementById('btnModeCalendario').onclick = () => setModo('calendario');
    document.getElementById('btnModeGeral').onclick = () => setModo('geral');

    document.querySelectorAll('.day-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            diaSemanaAtual = btn.dataset.dia;
            conectarBanco(`rotina_semanal/${diaSemanaAtual}`);
        };
    });

    datePicker.onchange = (e) => atualizarVisualCalendario(e.target.value);
    monitorarTodosEventos();
    setModo('rotina');

</script>
</body>
</html>
